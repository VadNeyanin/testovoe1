- name: RHEL - Install prerequisites
  ansible.builtin.raw: dnf5 install -y dnf-plugins-core || dnf install -y dnf-plugins-core
  changed_when: false

- name: RHEL - Add docker repo
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_facts['distribution'] | lower }}/docker-ce.repo"
    dest: /etc/yum.repos.d/docker-ce.repo
    force: yes